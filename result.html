<!doctype html>
<html>
  <head>
    <title>Result</title>
    <link rel="stylesheet" href="result.css" />
    <link rel="stylesheet" href="main.css" />
  </head>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />

  <body>
    <div class="result">
      <div class="result__card">
        <h1>Exam Result</h1>
        <p id="studentName">soliman Rabie</p>
        <p id="studentScore">45 <span class="fullScore">/ 50</span></p>

        <div class="result__card__buttons">
          <button type="button" class="btn btn-primary">Retry</button>
          <button type="button" class="btn btn-primary">Home</button>
        </div>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const score = params.get("score");

      document.getElementById("studentScore").innerHTML =
        score + " <span class='fullScore'>/ 8</span>";
    </script>
    <script type="module" src="main.js"></script>
  </body>
</html>
