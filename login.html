<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<link rel="stylesheet" href="main.css">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card auth-card shadow-sm p-4" style="max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Sign In</h3>
                <p class="text-muted small">Enter your credentials to continue</p>
            </div>

            <form id="login-form">
                <div class="mb-3">
                    <label for="login-email" class="form-label small fw-bold">Email Address</label>
                    <input type="email" class="form-control custom-input" id="login-email" placeholder="name@example.com">
                </div>

                <div class="mb-4">
                    <label for="login-password" class="form-label small fw-bold">Password</label>
                    <input type="password" class="form-control custom-input" id="login-password" placeholder="********">
                </div>

                <button type="submit" class="btn btn-primary btn-main w-100">Sign In</button>

                <p class="text-center mt-3 small">
                    Don't have an account? <a href="register.html" class="text-decoration-none">Register here</a>
                </p>
            </form>
        </div>
    </div>

</body>
</html>
