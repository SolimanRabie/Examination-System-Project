  <body>
    <div class="container-fluid">
      <!-- progress -->

      <div class="prog">
        <div
          class="progress"
          role="progressbar"
          aria-label="Basic example"
          aria-valuenow="25"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          <div class="progress-bar" style="width: 25%"></div>
        </div>
      </div>
      <div class="change">
        <div class="qsec">
          <!-- question section -->
          <div class="question">
            <!-- question field -->
            <div class="question__qc">what is your fav color ?</div>
            <!-- first choice -->
            <div class="question__form-check">
              <input
                class="form-check-input"
                type="radio"
                name="radioDefault"
                id="radioDefault1"
              />
              <label class="form-check-label" for="radioDefault1">
                choice one
              </label>
            </div>
            <!-- second choice  -->
            <div class="question__form-check">
              <input
                class="form-check-input"
                type="radio"
                name="radioDefault"
                id="radioDefault2"
              />
              <label class="form-check-label" for="radioDefault2">
                choice two
              </label>
            </div>
            <!-- third choice -->
            <div class="question__form-check">
              <input
                class="form-check-input"
                type="radio"
                name="radioDefault"
                id="radioDefault3"
              />
              <label class="form-check-label" for="radioDefault3">
                choice three
              </label>
            </div>
            <!-- fourth choice -->
            <div class="question__form-check">
              <input
                class="form-check-input"
                type="radio"
                name="radioDefault"
                id="radioDefault4"
                checked
              />
              <label class="form-check-label" for="radioDefault4">
                Default checked radio
              </label>
            </div>
            <!-- btn -->
            <div class="question__buttons">
              <button type="button" class="btn btn-outline-primary">
                Previous
              </button>
              <!-- mark btn -->
              <button type="button" class="btn btn-outline-warning">
                Mark
              </button>
              <!-- next btn -->
              <button type="button" class="btn btn-outline-primary">
                Next
              </button>
            </div>
          </div>
        </div>
        <!-- mark section -->
        <div class="change__markQ">markkkk lolo</div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

    ></script>
