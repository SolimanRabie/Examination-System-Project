<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="main.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <style>
    .submit-container {
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .submit {
      position: fixed;
      bottom: 20px;
      right: 40px;
      width: 150px;
      font-size: 18px;
    }

    /*  */

    /*  */
  </style>
  <body>
    <div class="container-fluid">
      <!-- timer -->

      <!-- progress -->

      <div class="prog">
        <div
          class="progress"
          role="progressbar"
          aria-label="Basic example"
          aria-valuenow="25"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          <div class="progress-bar" style="width: 25%"></div>
        </div>
      </div>
      <div class="timer">Time Left: <span id="time">60</span> sec</div>
      <div class="change">
        <div class="qsec">
          <!-- question section -->
          <div class="question">
            <!-- question field -->
            <div class="question__qc">what is your fav color ?</div>
            <!-- first choice -->
            <div class="question__form-check">
              <input
                class="form-check-input"
                type="radio"
                name="radioDefault"
                id="radioDefault1"
              />
              <label class="form-check-label" for="radioDefault1">
                choice one
              </label>
            </div>
            <!-- second choice  -->
            <div class="question__form-check">
              <input
                class="form-check-input"
                type="radio"
                name="radioDefault"
                id="radioDefault2"
              />
              <label class="form-check-label" for="radioDefault2">
                choice two
              </label>
            </div>
            <!-- third choice -->
            <div class="question__form-check">
              <input
                class="form-check-input"
                type="radio"
                name="radioDefault"
                id="radioDefault3"
              />
              <label class="form-check-label" for="radioDefault3">
                choice three
              </label>
            </div>
            <!-- fourth choice -->
            <div class="question__form-check">
              <input
                class="form-check-input"
                type="radio"
                name="radioDefault"
                id="radioDefault4"
                checked
              />
              <label class="form-check-label" for="radioDefault4">
                Default checked radio
              </label>
            </div>
            <!-- btn -->
            <div class="question__buttons">
              <button type="button" class="btn btn-outline-secondary">
                Previous
              </button>
              <!-- mark btn -->
              <button type="button" class="btn btn-outline-warning">
                Mark
              </button>
              <!-- next btn -->
              <button type="button" class="btn btn-outline-primary">
                Next
              </button>
            </div>
          </div>
        </div>
        <!-- mark section -->
        <div class="change__markQ"></div>
      </div>
    </div>
    <div class="submit-container">
      <button class="btn btn-lg btn-success submit">Submit Exam</button>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
